name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish pubsub-core
        run: cargo publish -p pubsub-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub-protocol
        run: cargo publish -p pubsub-protocol --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub-broker
        run: cargo publish -p pubsub-broker --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub-transport-tcp
        run: cargo publish -p pubsub-transport-tcp --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub-client
        run: cargo publish -p pubsub-client --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub-server
        run: cargo publish -p pubsub-server --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30

      - name: Publish pubsub
        run: cargo publish -p pubsub --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
