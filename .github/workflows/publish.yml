name: Publish

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish() {
            local crate=$1
            set +e
            output=$(cargo publish -p "$crate" 2>&1)
            status=$?
            set -e
            echo "$output"
            if [ $status -ne 0 ]; then
              echo "$output" | grep -q "already uploaded" || exit $status
              echo "=> $crate already published, skipping"
              return
            fi
            sleep 30
          }

          publish pubsub-core
          publish pubsub-protocol
          publish pubsub-broker
          publish pubsub-transport-tcp
          publish pubsub-client
          publish pubsub-server
          publish pubsub
